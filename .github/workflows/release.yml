---
name: Create Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version (e.g. 0.1.1) — required when not triggered by a tag
        required: false
        type: string
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  unit-tests:
    uses: ./.github/workflows/unit-tests-reusable.yml
    secrets: inherit

  create-release:
    name: Create per-use-case release zips
    needs: unit-tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Resolve version
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME}"
            TAG_NAME="${GITHUB_REF_NAME}"
          elif [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
            TAG_NAME="${VERSION}"
          else
            echo "workflow_dispatch requires a version input when not triggered by a tag" >&2
            exit 1
          fi

          if [[ -z "$VERSION" || "$VERSION" == "null" ]]; then
            echo "Could not resolve release version" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build per-use-case zips
        run: composer run package:release

      - name: Collect release assets
        run: |
          mkdir -p release-assets
          for plugin_dir in plugins/coverkit-usecase-*; do
            slug=$(basename "$plugin_dir")
            if [[ ! -f "dist/${slug}.zip" ]]; then
              echo "Missing dist/${slug}.zip" >&2
              exit 1
            fi
            cp "dist/${slug}.zip" "release-assets/"
          done

      - name: Extract changelog section
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md > release-notes.md

          if [[ ! -s release-notes.md ]]; then
            echo "Release notes for version ${VERSION} not found in CHANGELOG.md" >&2
            exit 1
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: ${{ steps.version.outputs.version }}
          body_path: release-notes.md
          files: release-assets/*.zip
          fail_on_unmatched_files: true
