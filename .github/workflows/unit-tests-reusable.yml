---
name: Unit tests (reusable)

on:
    workflow_call:

jobs:
    js-unit:
        name: JS unit tests
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup Node.js
              uses: actions/setup-node@v5
              with:
                  node-version-file: '.nvmrc'
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm run test:unit -- --ci

    php-unit:
        name: PHP unit tests
        runs-on: ubuntu-latest
        timeout-minutes: 15

        steps:
            - name: Checkout
              uses: actions/checkout@v5

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.2'
                  extensions: mbstring
                  coverage: none

            # PHPUnit does not need Strauss / prefixed vendor build — skip lifecycle scripts for speed and reliability.
            - name: Install Composer dependencies
              uses: ramsey/composer-install@v4
              with:
                  composer-options: '--prefer-dist --no-interaction --no-scripts'

            - name: Run PHPUnit
              run: composer run test:php
