---
name: Unit tests

on:
    pull_request:
    push:
        branches:
            - develop
            - main
    workflow_dispatch:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    unit-tests:
        uses: ./.github/workflows/unit-tests-reusable.yml
        secrets: inherit
